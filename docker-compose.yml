name: orderbook

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: orderbook_nginx
    restart: unless-stopped
    ports:
      - "8092:80"
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - orderbook

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: orderbook/php:8.3
    container_name: orderbook_app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html:cached
    depends_on:
      - postgres
    networks:
      - orderbook

  queue:
    image: orderbook/php:8.3
    container_name: orderbook_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=60 --sleep=1
    volumes:
      - ./backend:/var/www/html:cached
    depends_on:
      - app
      - postgres
    networks:
      - orderbook

  reverb:
    image: orderbook/php:8.3
    container_name: orderbook_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8094:8080"
    volumes:
      - ./backend:/var/www/html:cached
    depends_on:
      - app
      - postgres
    networks:
      - orderbook

  postgres:
    image: postgres:16-alpine
    container_name: orderbook_postgres
    restart: unless-stopped
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-orderbook}
      POSTGRES_USER: ${DB_USER:-orderbook}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orderbook}
    volumes:
      - orderbook_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - orderbook

  node:
    image: node:22-alpine
    container_name: orderbook_node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "8093:5173"
    volumes:
      - ./frontend:/app:cached
    networks:
      - orderbook

networks:
  orderbook:
    driver: bridge

volumes:
  orderbook_postgres_data:
